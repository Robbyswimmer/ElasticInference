model:
  name: facebook/opt-1.3b
  dtype: float16
  max_seq_len: 2048
  device: cuda

gateway:
  host: 0.0.0.0
  port: 50051
  max_queue_size: 256
  request_timeout_ms: 30000

prefill:
  host: 0.0.0.0
  connect_host: prefill  # K8s override: "prefill" (service name)
  port: 50052
  batch_size: 8
  max_concurrent: 4

decode:
  host: 0.0.0.0
  connect_host: decode  # K8s override: "decode" (service name)
  port: 50053
  max_batch_size: 32
  max_new_tokens: 512
  # MoE simulation: top-k of N experts activated per decode step
  moe_num_experts: 8
  moe_top_k: 2

redis:
  host: redis
  port: 6379
  db: 0
  ttl_seconds: 300
  max_connections: 20

scaling:
  metrics_interval: 5
  cooldown: 75
  ema_alpha: 0.18
  metrics_timeout_seconds: 8
  prometheus_enabled: true
  prometheus_port: 9100
  downscale_signal: instant
  service_time_baseline_ms: 300
  fast_scale_up: true
  fast_scale_up_factor: 1.5
  fast_scale_up_step: 2
  oscillation_backoff_factor: 1.5
  max_adaptive_cooldown: 240
  scale_up_consecutive_required: 1
  scale_down_consecutive_required: 2
  signal_weights:
    utilization: 0.82
    service_time: 0.03
    arrival_rate: 0.15
  prefill:
    min_replicas: 1
    max_replicas: 2
    scale_up_threshold: 0.02
    scale_down_threshold: 0.005
  decode:
    min_replicas: 1
    max_replicas: 5
    scale_up_threshold: 0.2
    scale_down_threshold: 0.05
    scale_down_consecutive_required: 2

autotune:
  enabled: false
  gpu_percentages: [25, 50, 75]
  config_space:
    prefill_batch_size: [1, 2, 4, 8, 16]
    decode_batch_size: [4, 8, 16, 32, 64]

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

prometheus:
  enabled: true
  port: 9090
  gateway_port: 9090
  prefill_port: 9091
  decode_port: 9092
