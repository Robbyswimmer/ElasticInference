apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: llm-inference
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
    rule_files:
      - /etc/prometheus/alert_rules.yml

    scrape_configs:
      - job_name: 'llm-inference-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['llm-inference']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: "true"
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            regex: (.+)
            target_label: __tmp_port
            replacement: $1
            action: replace
          - source_labels: [__meta_kubernetes_pod_ip, __tmp_port]
            regex: (.+);(.+)
            target_label: __address__
            replacement: $1:$2
            action: replace
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
            action: replace

      # Static fallback for non-K8s SD environments
      - job_name: 'llm-inference-static'
        static_configs:
          - targets:
            - 'gateway:9090'
            - 'prefill:9090'
            - 'decode:9090'
            - 'scaling-controller:9100'
  alert_rules.yml: |
    groups:
      - name: llm-inference.rules
        rules:
          - alert: HighErrorRate
            expr: |
              (
                sum(rate(gateway_requests_total{status!="ok"}[5m]))
                /
                clamp_min(sum(rate(gateway_requests_total[5m])), 1e-9)
              ) > 0.02
            for: 5m
            labels:
              severity: warning
              service: gateway
            annotations:
              summary: "Gateway error rate > 2% for 5m"
              description: "gateway_requests_total non-ok ratio is above 2%."

          - alert: E2ELatencyP95High
            expr: |
              histogram_quantile(
                0.95,
                sum(rate(gateway_e2e_latency_ms_bucket[5m])) by (le)
              ) > 3000
            for: 5m
            labels:
              severity: warning
              service: gateway
            annotations:
              summary: "Gateway E2E p95 latency is high"
              description: "gateway_e2e_latency_ms p95 exceeds 3000ms for 5m."

          - alert: DecodeQueueBacklog
            expr: avg_over_time(gateway_decode_queue_length[5m]) > 8
            for: 5m
            labels:
              severity: warning
              service: gateway
            annotations:
              summary: "Decode queue backlog sustained"
              description: "gateway_decode_queue_length avg over 5m exceeds 8."

          - alert: PrefillQueueBacklog
            expr: avg_over_time(gateway_prefill_queue_length[5m]) > 4
            for: 5m
            labels:
              severity: warning
              service: gateway
            annotations:
              summary: "Prefill queue backlog sustained"
              description: "gateway_prefill_queue_length avg over 5m exceeds 4."

          - alert: NoTrafficButHighActive
            expr: |
              (
                sum(rate(gateway_requests_total[5m])) < 0.05
              )
              and
              (
                avg_over_time(gateway_active_requests[5m]) > 3
              )
            for: 10m
            labels:
              severity: warning
              service: gateway
            annotations:
              summary: "No traffic but active requests remain high"
              description: "Possible stuck requests: low ingress traffic but active requests stay high."

          - alert: ScalingOscillation
            expr: |
              (
                increase(scaler_scale_events_total{direction="up"}[10m]) > 0
              )
              and
              (
                increase(scaler_scale_events_total{direction="down"}[10m]) > 0
              )
              and
              (
                increase(scaler_oscillation_events_total[10m]) >= 1
              )
            for: 2m
            labels:
              severity: warning
              service: scaling-controller
            annotations:
              summary: "Scaling oscillation detected"
              description: "Both scale-up and scale-down happened in 10m with oscillation events recorded."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: llm-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.48.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=7d
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: llm-inference
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
  type: NodePort
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: llm-inference
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: llm-inference
roleRef:
  kind: ClusterRole
  name: prometheus
  apiGroup: rbac.authorization.k8s.io
