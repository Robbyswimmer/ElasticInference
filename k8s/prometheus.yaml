apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: llm-inference
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: 'llm-inference-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['llm-inference']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: "true"
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            regex: (.+)
            target_label: __tmp_port
            replacement: $1
            action: replace
          - source_labels: [__meta_kubernetes_pod_ip, __tmp_port]
            regex: (.+);(.+)
            target_label: __address__
            replacement: $1:$2
            action: replace
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
            action: replace

      # Static fallback for non-K8s SD environments
      - job_name: 'llm-inference-static'
        static_configs:
          - targets:
            - 'gateway:9090'
            - 'prefill:9090'
            - 'decode:9090'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: llm-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.48.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=7d
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: llm-inference
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
  type: NodePort
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: llm-inference
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: llm-inference
roleRef:
  kind: ClusterRole
  name: prometheus
  apiGroup: rbac.authorization.k8s.io
