apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: llm-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
        - name: gateway
          image: llm-inference/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 9090
              name: metrics
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: PREFILL_HOST
              value: "prefill"
            - name: PREFILL_PORT
              value: "50052"
            - name: DECODE_HOST
              value: "decode"
            - name: DECODE_PORT
              value: "50053"
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=2)"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=2)"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
