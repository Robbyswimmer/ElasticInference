apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefill
  namespace: llm-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefill
  template:
    metadata:
      labels:
        app: prefill
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
        - name: prefill
          image: llm-inference/worker:latest
          imagePullPolicy: IfNotPresent
          command: ["python3", "-m", "workers.prefill"]
          ports:
            - containerPort: 50052
              name: grpc
            - containerPort: 9090
              name: metrics
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: CUDA_MPS_ACTIVE_THREAD_PERCENTAGE
              value: "100"
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - "import grpc; ch=grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(ch).result(timeout=2)"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "import grpc; ch=grpc.insecure_channel('localhost:50052'); grpc.channel_ready_future(ch).result(timeout=2)"
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
